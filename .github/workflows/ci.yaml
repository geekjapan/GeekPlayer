name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      # Cache the pub cache so prebuilt native assets (sqlite3 libsqlite3,
      # media_kit libmpv/mimalloc, pdfium) are not re-downloaded each run.
      # hashFiles() is workspace-root relative — must use app/ prefix despite
      # the job's working-directory: app. (cache-ci-native-downloads)
      - name: Cache pub-cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      # add-about-and-licenses task 7.3 — regenerating
      # `lib/oss_licenses.dart` must be a no-op against the committed
      # file. Catches the "forgot to re-run flutter_oss_licenses:generate
      # after adding a dep" failure mode at PR time.
      - name: Verify OSS license data is up to date
        run: |
          dart run flutter_oss_licenses:generate -o lib/oss_licenses.dart -i flutter
          git diff --exit-code -- lib/oss_licenses.dart || {
            echo '::error::lib/oss_licenses.dart is out of sync with pubspec.yaml.' \
                 'Re-run `dart run flutter_oss_licenses:generate -o lib/oss_licenses.dart -i flutter` and commit.'
            exit 1
          }

      # add-about-and-licenses task 7.4 — LGPL-2.1 asset must be byte-
      # identical to the FSF text. Compare SHA-256 against the value
      # committed in assets/legal/checksums.txt.
      - name: Verify LGPL-2.1 asset integrity
        run: |
          cd assets/legal
          sha256sum -c checksums.txt

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        # Retry to absorb transient native-asset download failures (e.g.
        # package:sqlite3's libsqlite3 download hash mismatch). Persistent
        # failures still fail after the attempt cap. (harden-ci-native-downloads)
        run: |
          n=0; max=3
          until flutter test; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then echo "::error::flutter test failed after $max attempts"; exit 1; fi
            echo "::warning::flutter test attempt $n failed; retrying in 20s"; sleep 20
          done

  build-android-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Cache pub-cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      # Cache the Gradle distribution + dependency caches to avoid the flaky
      # HTTP 504 on the Gradle wrapper distribution download.
      # (cache-ci-native-downloads)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/gradle/wrapper/gradle-wrapper.properties', 'app/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android debug APK
        # Retry to absorb transient media_kit native download failures
        # (e.g. HTTP 504 on libmpv jars). (harden-ci-native-downloads)
        run: |
          n=0; max=3
          until flutter build apk --debug; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then echo "::error::flutter build apk failed after $max attempts"; exit 1; fi
            echo "::warning::flutter build apk attempt $n failed; retrying in 20s"; sleep 20
          done

      # 16 KB page-size ELF alignment gate (OpenSpec add-android-16kb-page-support).
      # Non-strict: libonnxruntime.so is a tolerated known-warning while upstream
      # ships no 16 KB-aligned build (方針 A); any other unaligned arm64 lib fails.
      - name: Verify 16 KB ELF alignment of bundled arm64 libs
        run: python3 tool/check_so_alignment.py build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: geekplayer-android-debug-${{ github.run_number }}
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  build-windows-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      # Windows pub cache lives under %LOCALAPPDATA%\Pub\Cache, not ~/.pub-cache.
      # Caches media_kit's libmpv download. (cache-ci-native-downloads)
      - name: Cache pub-cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        # Retry to absorb transient media_kit native download/integrity
        # failures. windows-latest defaults to pwsh, so force bash (Git Bash
        # is preinstalled) for the retry idiom. (harden-ci-native-downloads)
        shell: bash
        run: |
          n=0; max=3
          until flutter build windows --release; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then echo "::error::flutter build windows failed after $max attempts"; exit 1; fi
            echo "::warning::flutter build windows attempt $n failed; retrying in 20s"; sleep 20
          done

      - name: Package Windows release
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $exePath = Join-Path $releaseDir "geekplayer.exe"
          if (!(Test-Path $exePath)) {
            throw "Expected Windows executable was not found: $exePath"
          }
          $package = "GeekPlayer-windows-release-${{ github.run_number }}.zip"
          Compress-Archive -Path "$releaseDir/*" -DestinationPath $package -Force

      - name: Upload Windows release package
        uses: actions/upload-artifact@v4
        with:
          name: geekplayer-windows-release-${{ github.run_number }}
          path: app/GeekPlayer-windows-release-${{ github.run_number }}.zip
          if-no-files-found: error
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      # SPM resolution of the PDFium xcframework corrupts its artifact cache
      # ("already exists in file system"); force CocoaPods like build-ios.
      # (harden-ci-native-downloads)
      - name: Use CocoaPods for plugin resolution
        run: flutter config --no-enable-swift-package-manager

      # Cache pub-cache + the CocoaPods global download cache so libmpv / PDFium
      # tarballs are not re-fetched each run. (cache-ci-native-downloads)
      - name: Cache pub-cache and CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pub-pods-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release (smoke)
        # Retry to absorb transient native download/integrity failures.
        # (harden-ci-native-downloads)
        run: |
          n=0; max=3
          until flutter build macos --release --dart-define=GIT_SHA=${{ github.sha }}; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then echo "::error::flutter build macos failed after $max attempts"; exit 1; fi
            echo "::warning::flutter build macos attempt $n failed; retrying in 20s"; sleep 20
          done

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux native dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libmpv-dev ninja-build libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Cache pub-cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux release (smoke)
        # Retry to absorb transient media_kit native download/integrity
        # failures (e.g. mimalloc tarball integrity). (harden-ci-native-downloads)
        run: |
          n=0; max=3
          until flutter build linux --release --dart-define=GIT_SHA=${{ github.sha }}; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then echo "::error::flutter build linux failed after $max attempts"; exit 1; fi
            echo "::warning::flutter build linux attempt $n failed; retrying in 20s"; sleep 20
          done

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      # media_kit_libs_ios_video has no Swift Package Manager support yet, so
      # force CocoaPods resolution (which ships the prebuilt libmpv XCFramework).
      - name: Use CocoaPods for plugin resolution
        run: flutter config --no-enable-swift-package-manager

      - name: Cache pub-cache and CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pub-pods-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS release (smoke, no codesign)
        # Retry to absorb transient CocoaPods native download failures
        # (libmpv / PDFium tarballs). (harden-ci-native-downloads)
        run: |
          n=0; max=3
          until flutter build ios --release --no-codesign --dart-define=GIT_SHA=${{ github.sha }}; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then echo "::error::flutter build ios failed after $max attempts"; exit 1; fi
            echo "::warning::flutter build ios attempt $n failed; retrying in 20s"; sleep 20
          done
