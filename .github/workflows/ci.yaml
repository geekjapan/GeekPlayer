name: CI

on:
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      # add-about-and-licenses task 7.3 — regenerating
      # `lib/oss_licenses.dart` must be a no-op against the committed
      # file. Catches the "forgot to re-run flutter_oss_licenses:generate
      # after adding a dep" failure mode at PR time.
      - name: Verify OSS license data is up to date
        run: |
          dart run flutter_oss_licenses:generate -o lib/oss_licenses.dart -i flutter
          git diff --exit-code -- lib/oss_licenses.dart || {
            echo '::error::lib/oss_licenses.dart is out of sync with pubspec.yaml.' \
                 'Re-run `dart run flutter_oss_licenses:generate -o lib/oss_licenses.dart -i flutter` and commit.'
            exit 1
          }

      # add-about-and-licenses task 7.4 — LGPL-2.1 asset must be byte-
      # identical to the FSF text. Compare SHA-256 against the value
      # committed in assets/legal/checksums.txt.
      - name: Verify LGPL-2.1 asset integrity
        run: |
          cd assets/legal
          sha256sum -c checksums.txt

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-android-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: geekplayer-android-debug-${{ github.run_number }}
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  build-windows-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows release
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $exePath = Join-Path $releaseDir "geekplayer.exe"
          if (!(Test-Path $exePath)) {
            throw "Expected Windows executable was not found: $exePath"
          }
          $package = "GeekPlayer-windows-release-${{ github.run_number }}.zip"
          Compress-Archive -Path "$releaseDir/*" -DestinationPath $package -Force

      - name: Upload Windows release package
        uses: actions/upload-artifact@v4
        with:
          name: geekplayer-windows-release-${{ github.run_number }}
          path: app/GeekPlayer-windows-release-${{ github.run_number }}.zip
          if-no-files-found: error
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release (smoke)
        run: flutter build macos --release --dart-define=GIT_SHA=${{ github.sha }}

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux native dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libmpv-dev ninja-build libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux release (smoke)
        run: flutter build linux --release --dart-define=GIT_SHA=${{ github.sha }}

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      # media_kit_libs_ios_video has no Swift Package Manager support yet, so
      # force CocoaPods resolution (which ships the prebuilt libmpv XCFramework).
      - name: Use CocoaPods for plugin resolution
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS release (smoke, no codesign)
        run: flutter build ios --release --no-codesign --dart-define=GIT_SHA=${{ github.sha }}
