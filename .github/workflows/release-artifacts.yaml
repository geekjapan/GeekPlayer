name: Release Artifacts

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  build-windows-release:
    name: Build Windows release zip
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set artifact metadata
        shell: pwsh
        run: |
          $sha = git rev-parse --short HEAD
          if ("${{ github.ref_type }}" -eq "tag") {
            $suffix = "${{ github.ref_name }}"
          } else {
            $suffix = "run-${{ github.run_number }}"
          }
          "GIT_SHA=$sha" >> $env:GITHUB_ENV
          "ARTIFACT_SUFFIX=$suffix" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        shell: pwsh
        run: flutter build windows --release --dart-define=GIT_SHA=$env:GIT_SHA

      - name: Package Windows release
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $exePath = Join-Path $releaseDir "geekplayer.exe"
          if (!(Test-Path $exePath)) {
            throw "Expected Windows executable was not found: $exePath"
          }
          $package = "GeekPlayer-windows-$env:ARTIFACT_SUFFIX.zip"
          Compress-Archive -Path "$releaseDir/*" -DestinationPath $package -Force

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: geekplayer-windows
          path: app/GeekPlayer-windows-*.zip
          if-no-files-found: error
          retention-days: 14

  build-macos-release:
    name: Build unsigned macOS dmg
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set artifact metadata
        run: |
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ARTIFACT_SUFFIX=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "ARTIFACT_SUFFIX=run-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release
        run: flutter build macos --release --dart-define=GIT_SHA="$GIT_SHA"

      - name: Package unsigned macOS dmg
        run: |
          app_path="build/macos/Build/Products/Release/geekplayer.app"
          if [ ! -d "$app_path" ]; then
            echo "::error::Expected macOS app bundle was not found: $app_path"
            exit 1
          fi
          dmg="GeekPlayer-macos-$ARTIFACT_SUFFIX-unsigned.dmg"
          hdiutil create \
            -volname "GeekPlayer" \
            -srcfolder "$app_path" \
            -ov \
            -format UDZO \
            "$dmg"

      - name: Upload macOS dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: geekplayer-macos-unsigned
          path: app/GeekPlayer-macos-*-unsigned.dmg
          if-no-files-found: error
          retention-days: 14

  build-android-release:
    name: Build Android release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set artifact metadata
        run: |
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ARTIFACT_SUFFIX=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "ARTIFACT_SUFFIX=run-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android release APK
        # Debug-signed release APK (signingConfig = signingConfigs.debug in
        # build.gradle.kts) — installable for sideloading without a keystore.
        # Retry to absorb transient media_kit native download failures.
        run: |
          n=0; max=3
          until flutter build apk --release --dart-define=GIT_SHA="$GIT_SHA"; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then echo "::error::flutter build apk failed after $max attempts"; exit 1; fi
            echo "::warning::flutter build apk attempt $n failed; retrying in 20s"; sleep 20
          done

      - name: Rename APK
        run: |
          src="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$src" ]; then
            echo "::error::Expected release APK was not found: $src"
            exit 1
          fi
          cp "$src" "GeekPlayer-android-$ARTIFACT_SUFFIX.apk"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: geekplayer-android
          path: app/GeekPlayer-android-*.apk
          if-no-files-found: error
          retention-days: 14

  build-linux-release:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux native dependencies
        # mpv/libmpv-dev provide libmpv.so.2 (bundled into the AppImage);
        # libfuse2 + APPIMAGE_EXTRACT_AND_RUN cover FUSE-less runners.
        run: sudo apt-get update -y && sudo apt-get install -y libmpv-dev mpv ninja-build libgtk-3-dev libfuse2 file

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set artifact metadata
        run: |
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ARTIFACT_SUFFIX=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "ARTIFACT_SUFFIX=run-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux release
        run: |
          n=0; max=3
          until flutter build linux --release --dart-define=GIT_SHA="$GIT_SHA"; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then echo "::error::flutter build linux failed after $max attempts"; exit 1; fi
            echo "::warning::flutter build linux attempt $n failed; retrying in 20s"; sleep 20
          done

      - name: Assemble AppDir
        run: |
          bundle="build/linux/x64/release/bundle"
          if [ ! -d "$bundle" ]; then
            echo "::error::Linux release bundle not found: $bundle"
            exit 1
          fi
          # Keep Flutter's relative layout (binary expects ./lib and ./data
          # via rpath $ORIGIN/lib), so copy the whole bundle under usr/bin.
          mkdir -p AppDir/usr/bin
          cp -r "$bundle"/* AppDir/usr/bin/

      - name: Build AppImage (bundle libmpv)
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          curl -fL -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          # The gtk plugin is a script shipped in the repo (no release asset).
          curl -fL -o linuxdeploy-plugin-gtk \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk
          export PATH="$PWD:$PATH"
          libmpv="$(ldconfig -p | awk '/libmpv\.so\.2/{print $NF; exit}')"
          if [ -z "$libmpv" ]; then libmpv="$(ldconfig -p | awk '/libmpv\.so/{print $NF; exit}')"; fi
          if [ -z "$libmpv" ]; then echo "::error::libmpv.so not found via ldconfig"; exit 1; fi
          echo "Bundling libmpv: $libmpv"
          export OUTPUT="GeekPlayer-linux-$ARTIFACT_SUFFIX.AppImage"
          ./linuxdeploy --appdir AppDir \
            --executable AppDir/usr/bin/geekplayer \
            --desktop-file packaging/linux/geekplayer.desktop \
            --icon-file packaging/linux/geekplayer.png \
            --library AppDir/usr/bin/lib/libapp.so \
            --library AppDir/usr/bin/lib/libflutter_linux_gtk.so \
            --library "$libmpv" \
            --plugin gtk \
            --output appimage
          # Confirm libmpv made it into the AppImage payload.
          ./"$OUTPUT" --appimage-extract >/dev/null 2>&1 || true
          if ls squashfs-root/usr/lib/libmpv.so* >/dev/null 2>&1; then
            echo "libmpv bundled OK"
          else
            echo "::warning::libmpv not detected under squashfs-root/usr/lib; verify on a real device"
          fi

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: geekplayer-linux
          path: app/GeekPlayer-linux-*.AppImage
          if-no-files-found: error
          retention-days: 14

  publish-github-release:
    name: Attach artifacts to GitHub Release
    if: github.ref_type == 'tag'
    needs:
      - build-windows-release
      - build-macos-release
      - build-android-release
      - build-linux-release
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
