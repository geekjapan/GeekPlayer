# Configuration for Flutter's `gen-l10n` tool.
#
# Flutter's gen-l10n tool requires this file at the project root
# (next to pubspec.yaml). The tasks.md originally suggested
# `app/lib/l10n/l10n.yaml`, but Flutter ignores it there.
#
# ARB files live in `lib/l10n/` (see `arb-dir`).
arb-dir: lib/l10n
template-arb-file: app_ja.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
output-dir: lib/l10n
nullable-getter: true
